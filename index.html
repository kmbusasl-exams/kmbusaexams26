<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMBUSA Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f4f8; overflow-x: hidden; }
        .wave-bg { position: relative; background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #3b82f6 100%); border-radius: 0 0 60px 60px; overflow: hidden; }
        .animated-blob { position: absolute; background: rgba(255, 255, 255, 0.05); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; animation: morphBlob 12s infinite linear; z-index: 0; }
        @keyframes morphBlob {
            0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(0deg); }
            50% { border-radius: 70% 30% 52% 48% / 60% 40% 70% 30%; transform: rotate(180deg); }
            100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: rotate(360deg); }
        }
        .spa-page { display: none; }
        .spa-page.active-page { display: block; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px; }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <div id="intro-screen" class="fixed inset-0 bg-blue-900 z-50 flex flex-col items-center justify-center text-white px-4">
        <div class="text-center z-10 space-y-6 animate__animated animate__fadeIn">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQYHbrqEegUN2m6QuS_MP80cGuqtEgD3qqngA&s" alt="Logo" class="w-32 h-32 rounded-full mx-auto border-4 border-white shadow-2xl">
            <h1 class="text-5xl font-black">KMBUSA</h1>
            <p class="text-blue-200 uppercase tracking-widest text-sm">Official Digital Portal</p>
            <button onclick="dismissIntro()" class="bg-white text-blue-900 font-bold px-8 py-3 rounded-full shadow-lg hover:scale-105 transition">Enter Portal</button>
        </div>
    </div>

    <div id="main-app" class="hidden flex-col min-h-screen opacity-0 transition-opacity duration-1000">
        <header class="wave-bg text-white pb-24 pt-8 px-4 text-center shadow-xl">
            <nav class="flex justify-center space-x-2 bg-white/10 p-1.5 rounded-full backdrop-blur-md max-w-fit mx-auto">
                <button onclick="navigateSPA('register')" id="nav-register" class="px-5 py-2 rounded-full text-sm font-semibold bg-white text-blue-700">Registration</button>
                <button onclick="navigateSPA('about')" id="nav-about" class="px-5 py-2 rounded-full text-sm font-semibold text-white">About Us</button>
                <button onclick="navigateSPA('admin-login')" id="nav-admin-login" class="px-5 py-2 rounded-full text-sm font-semibold text-white">Admin Access</button>
            </nav>
        </header>

        <main class="flex-grow max-w-6xl w-full mx-auto px-4 -mt-14 z-10 mb-16">
            <section id="page-register" class="spa-page active-page animate__animated animate__fadeInUp">
                <div class="bg-white glass-card p-8 shadow-2xl">
                    <h3 class="text-2xl font-bold text-center text-blue-950 mb-8">Student Registration</h3>
                    <form onsubmit="executeRegistration(event)" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="fullName" placeholder="Full Name" required class="px-4 py-3 bg-gray-50 border rounded-xl w-full">
                        <input type="text" id="nicNumber" placeholder="NIC Number" required class="px-4 py-3 bg-gray-50 border rounded-xl w-full">
                        <select id="stream" required class="px-4 py-3 bg-gray-50 border rounded-xl w-full">
                            <option value="">Select Stream</option>
                            <option>Biological Science</option>
                            <option>Physical Science</option>
                        </select>
                        <select id="batch" required class="px-4 py-3 bg-gray-50 border rounded-xl w-full">
                            <option value="">Select Batch</option>
                            <option>2024</option><option>2025</option><option>2026</option>
                        </select>
                        <input type="text" id="schoolName" placeholder="School Name" required class="md:col-span-2 px-4 py-3 bg-gray-50 border rounded-xl">
                        <div class="flex space-x-4">
                            <label class="flex-1 text-center py-3 border rounded-xl cursor-pointer bg-gray-50"><input type="radio" name="gender" value="Male" required> Male</label>
                            <label class="flex-1 text-center py-3 border rounded-xl cursor-pointer bg-gray-50"><input type="radio" name="gender" value="Female" required> Female</label>
                        </div>
                        <input type="tel" id="contactNumber" placeholder="Contact Number" required class="px-4 py-3 bg-gray-50 border rounded-xl w-full">
                        <button type="submit" id="submitBtn" class="md:col-span-2 bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700">Submit Application</button>
                    </form>
                </div>
            </section>

            <section id="page-admin-dashboard" class="spa-page animate__animated animate__fadeIn">
                <div class="space-y-6">
                    <div class="bg-white glass-card p-6 flex justify-between items-center shadow-lg">
                        <h3 class="text-xl font-bold text-blue-900">Live Analytics Dashboard</h3>
                        <button onclick="fetchSheetData()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-md">Refresh Cloud Data</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-white glass-card p-5 h-72 shadow-xl"><canvas id="chartStream"></canvas></div>
                        <div class="bg-white glass-card p-5 h-72 shadow-xl"><canvas id="chartGender"></canvas></div>
                        <div class="bg-white glass-card p-5 h-72 shadow-xl"><canvas id="chartBatch"></canvas></div>
                    </div>

                    <div class="bg-white glass-card shadow-2xl overflow-hidden">
                        <div class="px-6 py-4 bg-gray-50 border-b flex justify-between font-bold">
                            <span>Registered Student Ledger</span>
                            <span id="record-count" class="text-blue-600">Total: 0</span>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm">
                                <thead class="bg-blue-900 text-white">
                                    <tr>
                                        <th class="px-6 py-4">Name</th>
                                        <th class="px-6 py-4">Stream (Batch)</th>
                                        <th class="px-6 py-4">School</th>
                                        <th class="px-6 py-4">Contact</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody" class="divide-y divide-gray-100">
                                    <tr><td colspan="4" class="py-10 text-center text-blue-500 italic">Click Refresh to Load Data</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-admin-login" class="spa-page">
                <div class="max-w-md mx-auto bg-white glass-card p-10 shadow-2xl text-center">
                    <h4 class="text-xl font-bold mb-6">Security Check</h4>
                    <input type="password" id="gatePass" class="w-full px-4 py-3 border rounded-xl mb-4 text-center" placeholder="Enter Admin Passcode">
                    <button onclick="checkAdmin()" class="w-full bg-blue-900 text-white py-3 rounded-xl font-bold">Access Dashboard</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // UPDATED URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsSe3s-ai1UrxWhX1Qxr8VnO5lf4c_hWFJQNOgabrIkmkO_2JDHFUIq4OecWesijh_/exec";
        let charts = {};

        function dismissIntro() {
            document.getElementById('intro-screen').classList.add('animate__fadeOutUp');
            setTimeout(() => {
                document.getElementById('intro-screen').remove();
                document.getElementById('main-app').classList.remove('hidden');
                setTimeout(() => document.getElementById('main-app').classList.add('opacity-100'), 50);
            }, 500);
        }

        function navigateSPA(pageId) {
            document.querySelectorAll('.spa-page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(`page-${pageId}`).classList.add('active-page');
            document.querySelectorAll('nav button').forEach(b => b.className = "px-5 py-2 rounded-full text-sm font-semibold text-white");
            document.getElementById(`nav-${pageId}`).className = "px-5 py-2 rounded-full text-sm font-semibold bg-white text-blue-700 shadow-sm";
            if(pageId === 'admin-dashboard') fetchSheetData();
        }

        async function executeRegistration(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "Saving to Cloud...";
            
            const data = {
                name: document.getElementById('fullName').value,
                nic: document.getElementById('nicNumber').value,
                stream: document.getElementById('stream').value,
                batch: document.getElementById('batch').value,
                school: document.getElementById('schoolName').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                contact: document.getElementById('contactNumber').value
            };

            try {
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert("Registration Successful!");
                e.target.reset();
            } catch(err) { alert("Network Error"); }
            btn.disabled = false; btn.innerText = "Submit Application";
        }

        async function fetchSheetData() {
            const table = document.getElementById('studentTableBody');
            table.innerHTML = `<tr><td colspan="4" class="py-10 text-center"><i class="fa-solid fa-sync fa-spin"></i> Fetching from Google Sheets...</td></tr>`;
            
            try {
                const response = await fetch(SCRIPT_URL, { redirect: 'follow' });
                const data = await response.json();
                
                document.getElementById('record-count').innerText = `Total: ${data.length}`;
                table.innerHTML = data.map(r => `
                    <tr class="hover:bg-blue-50 transition">
                        <td class="px-6 py-4 font-bold text-blue-900">${r.name}</td>
                        <td class="px-6 py-4">${r.stream} (${r.batch})</td>
                        <td class="px-6 py-4 text-xs">${r.school}</td>
                        <td class="px-6 py-4 font-mono font-bold">${r.contact}</td>
                    </tr>
                `).reverse().join('');
                
                updateAnalytics(data);
            } catch(e) { table.innerHTML = `<tr><td colspan="4" class="py-10 text-center text-red-500">Failed to connect to script.</td></tr>`; }
        }

        function updateAnalytics(data) {
            const counts = { streams: {}, genders: {}, batches: {} };
            data.forEach(r => {
                counts.streams[r.stream] = (counts.streams[r.stream] || 0) + 1;
                counts.genders[r.gender] = (counts.genders[r.gender] || 0) + 1;
                counts.batches[r.batch] = (counts.batches[r.batch] || 0) + 1;
            });

            const renderChart = (id, type, title, labelSet, colorSet) => {
                if(charts[id]) charts[id].destroy();
                charts[id] = new Chart(document.getElementById(id), {
                    type, data: { labels: Object.keys(labelSet), datasets: [{ data: Object.values(labelSet), backgroundColor: colorSet }] },
                    options: { maintainAspectRatio: false, plugins: { title: { display: true, text: title, font: {size: 14, weight: 'bold'} } } }
                });
            };

            renderChart('chartStream', 'doughnut', 'Student Streams', counts.streams, ['#1e3a8a', '#3b82f6']);
            renderChart('chartGender', 'pie', 'Gender Ratio', counts.genders, ['#4f46e5', '#ec4899']);
            renderChart('chartBatch', 'bar', 'Batch Enrollment', counts.batches, ['#10b981']);
        }

        function checkAdmin() {
            if(document.getElementById('gatePass').value === "admin123") navigateSPA('admin-dashboard');
            else alert("Incorrect Passcode");
        }
    </script>
</body>
</html>
